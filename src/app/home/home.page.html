<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title> Blank </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Blank</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <div class="ion-text-end">
      <ion-button color="success" (click)="setOpen(true)">
        Parametres
      </ion-button>
    </div>
    <ion-modal [isOpen]="isModalOpen">
      <ng-template>
        <ion-header>
          <ion-toolbar>
            <ion-title>Parametres</ion-title>
            <ion-buttons slot="end">
              <ion-button (click)="setOpen(false)" color="danger">Fermer</ion-button>
            </ion-buttons>
          </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
          <ion-label>Volume de la musique</ion-label>
          <ion-range aria-label="range-musique" [value]="50" [pin]="true" color="success"></ion-range>
          <ion-label>Volume des effets</ion-label>
          <ion-range aria-label="range-effets" [value]="50" [pin]="true" color="success"></ion-range>
        </ion-content>
      </ng-template>
    </ion-modal>
  </ion-content>

  <div id="container">
    <div class="row">
      <div class="col-12 text-center mb-5" id="main">
        <!-- Bouton de connexion -->
        <ion-button
          *ngIf="isDisconnected"
          id="connect"
          class="btn btn-primary"
          color="primary"
          (click)="loginWithSpotify()"
        >
          Se connecter avec Spotify
        </ion-button>
        <!-- <app-test *ngIf="!isDisconnected"></app-test> -->
        <span *ngIf="!isDisconnected" style="color: rgb(0, 255, 0);">SPOTIFY CONNECTE</span>
      </div>
    </div>
  </div>
</ion-content>
